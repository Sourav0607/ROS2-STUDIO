name: ROS2 CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        ros_distro: [humble, jazzy]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up ROS2 ${{ matrix.ros_distro }}
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pyqt5 \
            python3-matplotlib \
            python3-psutil \
            ros-${{ matrix.ros_distro }}-rosbag2-py \
            ros-${{ matrix.ros_distro }}-ros2cli \
            ros-${{ matrix.ros_distro }}-ros2topic \
            ros-${{ matrix.ros_distro }}-ros2node \
            ros-${{ matrix.ros_distro }}-ros2bag

      - name: Create workspace and build
        run: |
          mkdir -p ~/ros2_ws/src
          cp -r $GITHUB_WORKSPACE ~/ros2_ws/src/ros2_studio
          cd ~/ros2_ws
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          colcon build --packages-select ros2_studio --event-handlers console_cohesion+

      - name: Run tests
        run: |
          cd ~/ros2_ws
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          colcon test --packages-select ros2_studio --event-handlers console_cohesion+
          colcon test-result --verbose

      - name: Check package import
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source ~/ros2_ws/install/setup.bash
          python3 -c "import ros2_studio; print('ros2_studio imported successfully')"
          python3 -c "from ros2_studio.command.studio import StudioCommand; print('StudioCommand OK')"
          python3 -c "from ros2_studio.core.bag_recorder import BagRecorder; print('BagRecorder OK')"
          python3 -c "from ros2_studio.core.bag_player import BagPlayer; print('BagPlayer OK')"
          python3 -c "from ros2_studio.core.bag_converter import BagConverter; print('BagConverter OK')"